                            </div>
                            <div className="p-4 text-center border-t border-gray-700/50">
                                <strong className="text-cyan-300 block mb-2 text-base">{map.title}</strong>
                                <span className="text-gray-300 text-sm leading-relaxed block">{map.desc}</span>
                                <span className="inline-block mt-3 text-gray-400 text-xs font-medium bg-gray-900/80 px-3 py-1.5 rounded-full border border-gray-700 transition-colors group-hover:text-cyan-300 group-hover:border-cyan-800/50">(לחץ להגדלת המפה)</span>
                            </div>
                        </div>
                    </div>
                </section>
              </div>
            </article>
          );
        };

        const MediaModal = ({ content, onClose }) => {
          if (!content) return null;
          return (
            <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/85 backdrop-blur-sm p-4 transition-opacity duration-300" onClick={onClose}>
              <div className="relative max-w-full max-h-full flex flex-col items-center">
                <button onClick={onClose} className="absolute -top-14 right-0 md:-right-14 text-gray-400 hover:text-white bg-gray-800/80 hover:bg-gray-700 rounded-full p-2 transition-colors z-50"><i className="fa-solid fa-xmark text-xl"></i></button>
                {content.type === 'flag' ? (
                  <div className="w-full max-w-4xl aspect-[3/2] bg-black shadow-2xl rounded-lg overflow-hidden border border-gray-700" onClick={e => e.stopPropagation()}><content.component /></div>
                ) : (
                  <img src={content.url} alt={content.title} className="max-w-full max-h-[85vh] object-contain rounded-lg shadow-2xl border border-gray-700" onClick={e => e.stopPropagation()} onError={(e) => { e.target.onerror = null; e.target.src = 'https://placehold.co/800x400/1e293b/a3a8b8?text=Historical+Map'; }} />
                )}
              </div>
            </div>
          );
        };

        function App() {
          const [modalContent, setModalContent] = useState(null);

          React.useEffect(() => {
            const handleEsc = (e) => { if (e.key === 'Escape') setModalContent(null); };
            window.addEventListener('keydown', handleEsc);
            return () => window.removeEventListener('keydown', handleEsc);
          }, []);

          React.useEffect(() => {
            document.body.style.overflow = modalContent ? 'hidden' : '';
          }, [modalContent]);

          return (
            <div className="max-w-5xl mx-auto pt-4 md:pt-8">
              <Navbar />
              <header className="mb-10 text-center">
                  <h1 className="text-3xl md:text-5xl font-bold text-white mb-3">דגלי חצי האי ערב</h1>
                  <p className="text-gray-400 text-lg">מחקר וקסלולוגי, אטימולוגי, היסטורי וקרטוגרפי</p>
              </header>
              <div className="space-y-12">
                {countriesData.map(country => <CountryCard key={country.id} country={country} onModalOpen={setModalContent} />)}
              </div>
              <footer className="mt-12 mb-8 pt-8 border-t border-gray-800 text-center text-gray-500 w-full max-w-6xl mx-auto px-4">
                  <div className="flex justify-center items-center gap-2 mb-4"><i className="fa-solid fa-shield-halved text-gray-400 text-lg"></i><h4 className="font-bold text-gray-400 text-lg">פרטי המחקר והפרויקט</h4></div>
                  <div className="inline-block text-right bg-gray-900/50 p-6 rounded-xl border border-gray-800 w-full max-w-2xl">
                      <p className="text-gray-300 leading-loose">
                          <strong className="text-white ml-2">שם ההוגה:</strong> רם<br />
                          <strong className="text-white ml-2">שם הבונה/היצרן:</strong> ג'מיני (Gemini 3.1 Pro)<br />
                          <strong className="text-white ml-2">סיבת ההמצאה/הבנייה:</strong> המרת מחקר חצי האי ערב לארכיטקטורת React מהירה, אינטראקטיבית ווקטורית.<br />
                          <strong className="text-white ml-2">שנת הבנייה/היצירה:</strong> 2026<br />
                          <strong className="text-white ml-2">מקורות וקרדיט:</strong> אטימולוגיה וביוגרפיות מהספרות ההיסטורית. סמלי SVG וקטוריים פנימיים. מפות היסטוריות מ-Wikimedia/GitHub.
                      </p>
                  </div>
              </footer>
              <MediaModal content={modalContent} onClose={() => setModalContent(null)} />
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
