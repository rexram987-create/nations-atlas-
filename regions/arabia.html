                    <div>
                        <div className="flex items-center mb-4 border-b border-gray-800 pb-2">
                            <svg className="w-6 h-6 me-2 text-green-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"></path><line x1="4" y1="22" x2="4" y2="15"></line></svg>
                            <h3 className="text-2xl font-bold text-white">{uiStr.sectionSymbols}</h3>
                        </div>
                        <div className="bg-gray-950/50 rounded-xl p-5 border border-gray-800 h-full">
                            <h4 className="text-lg font-bold text-white mb-2"><i className="fa-solid fa-flag text-green-400 me-2"></i> {uiStr.lFlagMeaning}</h4>
                            <p className="text-gray-300 leading-relaxed text-lg mb-6 pb-6 border-b border-gray-800/70">{flagSymbolism[lang]}</p>
                            
                            <h4 className="text-lg font-bold text-white mb-2"><i className="fa-solid fa-paw text-orange-400 me-2"></i> {uiStr.lNationalAnimal} {nationalAnimal.name[lang]}</h4>
                            <p className="text-gray-300 leading-relaxed text-lg">{nationalAnimal.reason[lang]}</p>
                        </div>
                    </div>

                    <div>
                        <div className="flex items-center mb-4 border-b border-gray-800 pb-2">
                            <svg className="w-6 h-6 me-2 text-rose-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>
                            <h3 className="text-2xl font-bold text-white">{uiStr.sectionLeader}</h3>
                        </div>
                        <div className="bg-gray-800/20 rounded-xl p-5 border border-gray-800/50 h-full">
                            <h4 className="text-xl text-rose-300 font-bold mb-3">{figure.name[lang]} <span className="text-base text-gray-400">({figure.years})</span></h4>
                            <div className="space-y-4 text-gray-300 text-lg leading-relaxed">
                                <div><strong className="text-white block mb-1">{uiStr.lChildhood}</strong> {figure.childhood[lang]}</div>
                                <div><strong className="text-white block mb-1">{uiStr.lIdeology}</strong> {figure.ideology[lang]}</div>
                                <div><strong className="text-white block mb-1">{uiStr.lAchievements}</strong> {figure.achievements[lang]}</div>
                            </div>
                        </div>
                    </div>
                </section>

                <section>
                    <div className="flex items-center mb-4 border-b border-gray-800 pb-2">
                        <svg className="w-6 h-6 me-2 text-cyan-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M1 6v16l7-4 8 4 7-4V2l-7 4-8-4-7 4z"></path><line x1="8" y1="2" x2="8" y2="18"></line><line x1="16" y1="6" x2="16" y2="22"></line></svg>
                        <h3 className="text-2xl font-bold text-white">{uiStr.sectionCartography}</h3>
                    </div>
                    <div className="flex flex-col cursor-pointer group rounded-xl overflow-hidden border border-gray-700 bg-gray-800/30 hover:border-gray-500 transition-all duration-300 shadow-lg" onClick={() => onModalOpen({url: map.url, title: map.title[lang]})}>
                        <div className="relative h-64 md:h-80 w-full overflow-hidden bg-black">
                            <img 
                              src={map.url} 
                              alt={map.title[lang]} 
                              className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110"
                              onError={(e) => {
                                e.target.onerror = null; 
                                e.target.src = 'https://placehold.co/800x400/1e293b/a3a8b8?text=Historical+Map';
                              }}
                            />
                            <div className="absolute inset-0 bg-black/10 group-hover:bg-black/0 transition-colors duration-300"></div>
                        </div>
                        <div className="p-4 text-center border-t border-gray-700/50">
                            <strong className="text-cyan-300 block mb-2 text-lg">{map.title[lang]}</strong>
                            <span className="text-gray-300 text-base leading-relaxed block">{map.desc[lang]}</span>
                            <span className="inline-block mt-3 text-gray-400 text-sm font-medium bg-gray-900/80 px-4 py-1.5 rounded-full border border-gray-700 transition-colors group-hover:text-cyan-300 group-hover:border-cyan-800/50">{uiStr.lClickEnlargeMap}</span>
                        </div>
                    </div>
                </section>

              </div>
            </article>
          );
        };

        const MediaModal = ({ content, onClose }) => {
          if (!content) return null;
          
          return (
            <div 
              className="fixed inset-0 z-[100] flex items-center justify-center bg-black/85 backdrop-blur-sm p-4 transition-opacity duration-300"
              onClick={onClose}
            >
              <div className="relative max-w-full max-h-full flex flex-col items-center">
                <button 
                  onClick={onClose}
                  className="absolute -top-14 right-0 md:-right-14 text-gray-400 hover:text-white bg-gray-800/80 hover:bg-gray-700 rounded-full p-2 transition-colors z-50"
                  aria-label="Close"
                >
                  <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                  </svg>
                </button>
                
                <img 
                  src={content.url} 
                  alt={content.title} 
                  className="max-w-full max-h-[85vh] object-contain rounded-lg shadow-2xl border border-gray-700" 
                  onClick={e => e.stopPropagation()}
                  onError={(e) => {
                    e.target.onerror = null; 
                    e.target.src = 'https://placehold.co/800x400/1e293b/a3a8b8?text=Image+Not+Found';
                  }}
                />
              </div>
            </div>
          );
        };

        function App() {
          const [lang, setLang] = useState('he');
          const [modalContent, setModalContent] = useState(null);

          const uiStr = ui[lang];

          // ניהול כיוון המסמך לפי שפה
          React.useEffect(() => {
            document.documentElement.dir = lang === 'he' ? 'rtl' : 'ltr';
            document.documentElement.lang = lang;
          }, [lang]);

          React.useEffect(() => {
            const handleEsc = (e) => { if (e.key === "Escape") setModalContent(null); };
            window.addEventListener('keydown', handleEsc);
            return () => window.removeEventListener('keydown', handleEsc);
          }, []);

          React.useEffect(() => {
            document.body.style.overflow = modalContent ? 'hidden' : '';
          }, [modalContent]);

          return (
            <div className="max-w-5xl mx-auto pt-4 md:pt-8 relative">
              
              {/* כפתור החלפת שפה */}
              <div className="absolute top-0 right-4 md:right-8">
                <button 
                  onClick={() => setLang(lang === 'he' ? 'en' : 'he')}
                  className="flex items-center gap-2 bg-gray-800 hover:bg-gray-700 text-white px-4 py-2 rounded-full border border-gray-600 transition-colors shadow-lg font-medium text-sm"
                >
                  <i className="fa-solid fa-globe text-blue-400"></i>
                  {uiStr.langBtn}
                </button>
              </div>

              <header className="mb-10 text-center mt-12 md:mt-0">
                  <h1 className="text-3xl md:text-5xl font-bold text-white mb-3">{uiStr.mainTitle}</h1>
                  <p className="text-gray-400 text-lg">{uiStr.subTitle}</p>
              </header>

              <div className="space-y-12">
                {countriesData.map(country => (
                  <CountryCard 
                    key={country.id} 
                    country={country} 
                    onModalOpen={setModalContent} 
                    lang={lang}
                    uiStr={uiStr}
                  />
                ))}
              </div>

              <footer className="mt-12 mb-8 pt-8 border-t border-gray-800 text-center text-gray-500 w-full max-w-6xl mx-auto px-4">
                  <div className="flex justify-center items-center gap-2 mb-4">
                      <svg className="w-5 h-5 text-gray-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path><path d="M9.1 9a3 3 0 0 1 5.82 1c0 2-3 3-3 3"></path><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
                      <h4 className="font-bold text-gray-400 text-lg">{uiStr.footerTitle}</h4>
                  </div>
                  <div className="inline-block text-start bg-gray-900/50 p-6 rounded-xl border border-gray-800 w-full max-w-2xl">
                      <p className="text-gray-300 leading-loose">
                          <strong className="text-white me-2">{uiStr.fConcept}</strong> {uiStr.fConceptVal}<br />
                          <strong className="text-white me-2">{uiStr.fBuilder}</strong> {uiStr.fBuilderVal}<br />
                          <strong className="text-white me-2">{uiStr.fReason}</strong> {uiStr.fReasonVal}<br />
                          <strong className="text-white me-2">{uiStr.fYear}</strong> {uiStr.fYearVal}<br />
                          <strong className="text-white me-2">{uiStr.fCredits}</strong> {uiStr.fCreditsVal}
                      </p>
                  </div>
              </footer>

              <MediaModal content={modalContent} onClose={() => setModalContent(null)} />
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
