<!DOCTYPE html>
<html lang="he" dir="rtl" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>מדינות הסטאן - גרסת נתונים חדשה</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gray-950 text-gray-200 font-sans antialiased">
  <header class="border-b border-gray-800 bg-gray-900 px-6 py-10 text-center shadow-xl">
    <h1 class="text-4xl md:text-6xl font-black text-white">מדינות הסטאן</h1>
    <p class="mx-auto mt-4 max-w-3xl text-xl leading-relaxed text-gray-400">שער ניסיוני המבוסס על שכבת הנתונים החדשה של אטלס האומות.</p>
    <p class="mt-3 text-sm text-amber-300">כל מדינה מקבלת דף פרטי משלה. הדף המקורי עדיין נשאר פעיל ולא מוחלף.</p>
  </header>

  <main class="mx-auto max-w-7xl px-4 py-10 sm:px-6 lg:px-8">
    <div id="validation" class="mb-8 rounded-2xl border border-gray-800 bg-gray-900 p-5 text-gray-300"></div>
    <div id="countries" class="grid gap-6 md:grid-cols-2 xl:grid-cols-3"></div>
  </main>

  <script type="module">
    import regionsIndex from "../src/data/regionsIndex.js";
    import validateRegionsData from "../src/data/validateData.js";
    import { renderCountryCard } from "../src/components/CountryProfile.js";

    const validation = validateRegionsData();
    const validationBox = document.getElementById("validation");
    const countriesBox = document.getElementById("countries");
    const region = regionsIndex["stan-nations"];

    validationBox.innerHTML = validation.isValid
      ? `<strong class="text-emerald-400">בדיקת נתונים:</strong> המבנה תקין.`
      : `<strong class="text-red-400">בדיקת נתונים:</strong><ul class="mt-3 list-disc pr-6">${validation.issues.map(issue => `<li>${issue}</li>`).join("")}</ul>`;

    countriesBox.innerHTML = region.countries
      .map(country => renderCountryCard(country, "he", "stan-nations/"))
      .join("");
  </script>
</body>
</html>
