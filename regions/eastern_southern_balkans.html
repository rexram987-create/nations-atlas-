                      <svg className="w-5 h-5 ml-2 text-indigo-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                      <span><strong className="text-white">אוכלוסייה:</strong> {populationNum}</span>
                    </div>
                    <div className="flex items-center text-gray-300 bg-gray-800/50 px-4 py-2 rounded-lg md:col-span-2">
                      <svg className="w-5 h-5 ml-2 text-yellow-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"></circle><path d="M16 8h-6a2 2 0 1 0 0 4h4a2 2 0 1 1 0 4H8"></path><path d="M12 18V6"></path></svg>
                      <span><strong className="text-white">שם מטבע:</strong> {currency}</span>
                    </div>
                  </div>
                </div>
              </div>

              <div className="p-6 md:p-8 space-y-10">
                
                <section>
                    <div className="flex items-center mb-4 border-b border-gray-800 pb-2">
                        <i className="fa-solid fa-map-location-dot w-6 h-6 ml-2 text-sky-400 text-xl"></i>
                        <h3 className="text-2xl font-bold text-white">רקע פיזי ואנושי</h3>
                    </div>
                    <div className="bg-gray-950/50 rounded-xl p-5 border border-gray-800 space-y-4">
                        <p className="text-gray-300 leading-relaxed text-lg"><strong className="text-white">שטח וטופוגרפיה:</strong> {area}</p>
                        <p className="text-gray-300 leading-relaxed text-lg"><strong className="text-white">דמוגרפיה ({demographics.mainNationName} - {demographics.mainNationPercent}):</strong> {demographics.description}</p>
                        <p className="text-gray-300 leading-relaxed text-lg"><strong className="text-white">היסטוריה מודרנית:</strong> {modernHistory}</p>
                    </div>
                </section>

                <section>
                    <div className="flex items-center mb-4 border-b border-gray-800 pb-2">
                        <svg className="w-6 h-6 ml-2 text-green-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"></path><line x1="4" y1="22" x2="4" y2="15"></line></svg>
                        <h3 className="text-2xl font-bold text-white">וקסלולוגיה</h3>
                    </div>
                    <p className="text-gray-300 leading-relaxed text-lg">{flagSymbolism}</p>
                </section>
                
                <section>
                    <div className="flex items-center mb-4 border-b border-gray-800 pb-2">
                        <svg className="w-6 h-6 ml-2 text-purple-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>
                        <h3 className="text-2xl font-bold text-white">אטימולוגיה</h3>
                    </div>
                    <div className="bg-gray-950/50 rounded-xl p-5 border border-gray-800">
                        <ul className="space-y-4">
                            {etymology.parts.map((part, index) => (
                                <li key={index} className="flex flex-col md:flex-row md:items-baseline gap-2 md:gap-4">
                                    <span className={`font-bold min-w-[150px] md:text-lg flex-shrink-0 ${part.color} ${part.bg} border ${part.border} px-2 py-1 rounded-md`}>• {part.text}:</span>
                                    <span className="text-gray-300 leading-relaxed text-lg">{part.desc}</span>
                                </li>
                            ))}
                            <li className="flex flex-col md:flex-row md:items-baseline gap-2 md:gap-4 mt-2 pt-4 border-t border-gray-800/50">
                                <span className="font-bold text-amber-400 min-w-[150px] md:text-lg flex-shrink-0"><i className="fa-solid fa-quote-right ml-1"></i> משמעות השם:</span>
                                <span className="text-gray-200 font-bold leading-relaxed text-lg">{etymology.synthesis}</span>
                            </li>
                        </ul>
                    </div>
                </section>

                <section className="grid grid-cols-1 lg:grid-cols-2 gap-8 bg-gray-800/20 p-6 rounded-xl border border-gray-800/50">
                    <div>
                        <div className="flex items-center mb-4 border-b border-gray-700 pb-2">
                            <svg className="w-6 h-6 ml-2 text-rose-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>
                            <h3 className="text-2xl font-bold text-white">פרופיל מנהיג מכונן</h3>
                        </div>
                        <h4 className="text-xl text-rose-300 font-bold mb-3">{figure.name} <span className="text-base text-gray-400">({figure.years})</span></h4>
                        <div className="space-y-4 text-gray-300 text-lg leading-relaxed">
                            <div><strong className="text-white block mb-1">ילדות ורקע:</strong> {figure.childhood}</div>
                            <div><strong className="text-white block mb-1">אידאולוגיה:</strong> {figure.ideology}</div>
                            <div><strong className="text-white block mb-1">הישגים מרכזיים:</strong> {figure.achievements}</div>
                        </div>
                    </div>

                    <div>
                        <div className="flex items-center mb-4 border-b border-gray-700 pb-2">
                            <svg className="w-6 h-6 ml-2 text-cyan-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M1 6v16l7-4 8 4 7-4V2l-7 4-8-4-7 4z"></path><line x1="8" y1="2" x2="8" y2="18"></line><line x1="16" y1="6" x2="16" y2="22"></line></svg>
                            <h3 className="text-2xl font-bold text-white">קרטוגרפיה היסטורית</h3>
                        </div>
                        <div className="flex flex-col cursor-pointer group rounded-xl overflow-hidden border border-gray-700 bg-gray-800/30 hover:border-gray-500 transition-all duration-300 shadow-lg" onClick={() => onModalOpen({type: 'image', url: map.url, title: map.title})}>
                            <div className="relative h-48 md:h-56 w-full overflow-hidden bg-black">
                                <img 
                                  src={map.url} 
                                  alt={map.title} 
                                  className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110"
                                  onError={(e) => {
                                    e.target.onerror = null; 
                                    e.target.src = 'https://placehold.co/800x400/1e293b/a3a8b8?text=Historical+Map';
                                  }}
                                />
                                <div className="absolute inset-0 bg-black/10 group-hover:bg-black/0 transition-colors duration-300"></div>
                            </div>
                            <div className="p-4 text-center border-t border-gray-700/50">
                                <strong className="text-cyan-300 block mb-2 text-base">{map.title}</strong>
                                <span className="text-gray-300 text-sm leading-relaxed block">{map.desc}</span>
                                <span className="inline-block mt-3 text-gray-400 text-xs font-medium bg-gray-900/80 px-3 py-1.5 rounded-full border border-gray-700 transition-colors group-hover:text-cyan-300 group-hover:border-cyan-800/50">(לחץ להגדלת המפה)</span>
                            </div>
                        </div>
                    </div>
                </section>

              </div>
            </article>
          );
        };

        const MediaModal = ({ content, onClose }) => {
          if (!content) return null;
          
          return (
            <div 
              className="fixed inset-0 z-[100] flex items-center justify-center bg-black/85 backdrop-blur-sm p-4 transition-opacity duration-300"
              onClick={onClose}
            >
              <div className="relative max-w-full max-h-full flex flex-col items-center">
                <button 
                  onClick={onClose}
                  className="absolute -top-14 right-0 md:-right-14 text-gray-400 hover:text-white bg-gray-800/80 hover:bg-gray-700 rounded-full p-2 transition-colors z-50"
                  aria-label="סגור חלון"
                >
                  <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                  </svg>
                </button>
                
                {content.type === 'flag' ? (
                  <div className="w-full max-w-4xl aspect-[3/2] bg-black shadow-2xl rounded-lg overflow-hidden border border-gray-700" onClick={e => e.stopPropagation()}>
                    <content.component />
                  </div>
                ) : (
                  <img 
                    src={content.url} 
                    alt={content.title} 
                    className="max-w-full max-h-[85vh] object-contain rounded-lg shadow-2xl border border-gray-700" 
                    onClick={e => e.stopPropagation()}
                    onError={(e) => {
                      e.target.onerror = null; 
                      e.target.src = 'https://placehold.co/800x400/1e293b/a3a8b8?text=Historical+Map';
                    }}
                  />
                )}
              </div>
            </div>
          );
        };

        function App() {
          const [modalContent, setModalContent] = useState(null);

          // סגירת החלון במקש אסקייפ
          React.useEffect(() => {
            const handleEsc = (e) => { if (e.key === 'Escape') setModalContent(null); };
            window.addEventListener('keydown', handleEsc);
            return () => window.removeEventListener('keydown', handleEsc);
          }, []);

          // מניעת גלילה כאשר המודל פתוח
          React.useEffect(() => {
            document.body.style.overflow = modalContent ? 'hidden' : '';
          }, [modalContent]);

          return (
            <div className="max-w-5xl mx-auto pt-4 md:pt-8">
              <header className="mb-10 text-center">
                  <h1 className="text-4xl md:text-6xl font-black text-white mb-4 tracking-tight drop-shadow-lg">הבלקן המזרחי והדרומי</h1>
                  <p className="text-xl md:text-2xl text-gray-400 max-w-3xl mx-auto leading-relaxed">
                     מחקר וקסלולוגי, אטימולוגי וקרטוגרפי של מדינות חצי האי הבלקני
                  </p>
              </header>

              <div className="space-y-12">
                {countriesData.map(country => (
                  <CountryCard 
                    key={country.id} 
                    country={country} 
                    onModalOpen={setModalContent} 
                  />
                ))}
              </div>

              <footer className="mt-12 mb-8 pt-8 border-t border-gray-800 text-center text-gray-500 w-full max-w-6xl mx-auto px-4">
                  <div className="flex justify-center items-center gap-2 mb-4">
                      <svg className="w-5 h-5 text-gray-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path><path d="M9.1 9a3 3 0 0 1 5.82 1c0 2-3 3-3 3"></path><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
                      <h4 className="font-bold text-gray-400 text-lg">פרטי המחקר והפרויקט</h4>
                  </div>
                  <div className="inline-block text-right bg-gray-900/50 p-6 rounded-xl border border-gray-800 w-full max-w-2xl">
                      <p className="text-gray-300 leading-loose">
                          <strong className="text-white ml-2">שם ההוגה:</strong> רם<br />
                          <strong className="text-white ml-2">שם הבונה/היצרן:</strong> ג'מיני (Gemini 3.1 Pro)<br />
                          <strong className="text-white ml-2">סיבת ההמצאה/הבנייה:</strong> המשך פרויקט "אטלס האומות המלא" – הבלקן המזרחי והדרומי.<br />
                          <strong className="text-white ml-2">שנת הבנייה/היצירה:</strong> 2026<br />
                          <strong className="text-white ml-2">מקורות וקרדיט:</strong> אטימולוגיה מהספרות. סמלי SVG פנימיים בהתאמה וקטורית. מפות קרטוגרפיות וינטג' ייחודיות (AI).
                      </p>
                  </div>
              </footer>

              <MediaModal content={modalContent} onClose={() => setModalContent(null)} />
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
