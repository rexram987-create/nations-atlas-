                            <div className="bg-gray-800/40 p-6 rounded-3xl border border-gray-700/30 text-center">
                                <i className="fa-solid fa-users text-indigo-500 mb-2 text-xl"></i>
                                <div className="text-[10px] text-gray-500 font-bold uppercase tracking-widest mb-1">אוכלוסייה</div>
                                <div className="text-white font-black text-sm">{c.pop}</div>
                            </div>
                            <div className="bg-gray-800/40 p-6 rounded-3xl border border-gray-700/30 text-center col-span-2">
                                <i className="fa-solid fa-calendar-check text-sky-500 mb-2 text-xl"></i>
                                <div className="text-[10px] text-gray-500 font-bold uppercase tracking-widest mb-1">תאריכים מכוננים</div>
                                <div className="text-white font-black text-sm">{c.founding}</div>
                            </div>
                        </div>

                        {/* מפת היסטוריה */}
                        <div 
                          className="relative group cursor-pointer rounded-[2.5rem] overflow-hidden border-2 border-rose-500/10 hover:border-rose-500/40 transition-all duration-700"
                          onClick={() => setSelectedImg(c.map)}
                        >
                            <img 
                              src={c.map.url} 
                              alt={c.map.title} 
                              className="w-full h-64 object-cover grayscale-[0.2] group-hover:grayscale-0 group-hover:scale-110 transition-all duration-1000"
                              onError={(e) => { e.target.src = 'https://placehold.co/600x400/111827/ffffff?text=Map+File+Pending'; }}
                            />
                            <div className="absolute inset-0 bg-gradient-to-t from-black via-transparent to-transparent flex items-end justify-center p-8 opacity-0 group-hover:opacity-100 transition-opacity duration-500">
                                <span className="text-white text-xs font-black bg-rose-600 px-6 py-3 rounded-full shadow-xl">לחץ להגדלת המפה</span>
                            </div>
                        </div>
                      </aside>

                      {/* תוכן מרכזי */}
                      <div className="flex-grow space-y-14 text-right">
                        <div>
                            <h2 className="text-6xl md:text-9xl font-black text-white mb-3 tracking-tighter leading-none">{c.name}</h2>
                            <div className="text-2xl md:text-3xl text-rose-500 font-bold opacity-80 italic">{c.officialName}</div>
                        </div>

                        <section className="space-y-8">
                            <div className="flex items-center gap-4 text-rose-400 border-r-8 border-rose-600 pr-6">
                                <i className="fa-solid fa-feather-pointed text-3xl"></i>
                                <h4 className="text-3xl font-black tracking-tighter">ניתוח אטימולוגי מורחב</h4>
                            </div>
                            <div className="bg-gray-950/80 p-10 rounded-[3rem] border border-gray-800 shadow-inner">
                                <div className="space-y-10">
                                    {c.etymology.parts.map((p, i) => (
                                        <div key={i} className="flex flex-col md:flex-row gap-6 items-start">
                                            <div className="text-amber-500 font-black text-2xl min-w-[180px] border-r-2 border-amber-500/30 pr-4">{p.part}</div>
                                            <div className="text-gray-300 text-xl leading-relaxed">{p.desc}</div>
                                        </div>
                                    ))}
                                    <div className="pt-8 border-t border-gray-800">
                                        <div className="text-gray-500 text-xs font-bold uppercase mb-2 tracking-widest">סיכום ומשמעות סופית</div>
                                        <div className="text-3xl font-black text-white italic">"{c.etymology.summary}"</div>
                                    </div>
                                </div>
                            </div>
                        </section>

                        <section className="space-y-6">
                            <div className="flex items-center gap-4 text-sky-400">
                                <i className="fa-solid fa-book-open text-3xl"></i>
                                <h4 className="text-3xl font-black">היסטוריה ומרקם אנושי</h4>
                            </div>
                            <p className="text-2xl text-gray-200 leading-relaxed font-light">{c.history}</p>
                            <p className="text-xl text-gray-400 italic bg-gray-900/40 p-6 rounded-3xl border-r-4 border-sky-600 shadow-lg">{c.demographics}</p>
                        </section>

                        {/* מנהיג מכונן */}
                        <section className="bg-gradient-to-br from-indigo-900/30 to-gray-900 p-12 rounded-[4rem] border border-indigo-500/20 shadow-2xl overflow-hidden relative">
                            <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-indigo-500 to-transparent opacity-30"></div>
                            <div className="flex items-center gap-5 mb-12">
                                <i className="fa-solid fa-crown text-4xl text-indigo-400"></i>
                                <h4 className="text-4xl font-black text-white tracking-tight">פרופיל מנהיג מכונן</h4>
                            </div>
                            
                            <div className="space-y-14">
                                <div className="border-b border-gray-800 pb-8">
                                    <h5 className="text-5xl font-black text-white mb-2">{c.figure.name}</h5>
                                    <span className="text-indigo-400 font-bold text-2xl italic tracking-wider">({c.figure.years})</span>
                                </div>

                                <div className="space-y-12">
                                    <div>
                                        <span className="text-indigo-500 font-black text-sm uppercase tracking-[0.3em] block mb-4 underline decoration-indigo-500/30">ילדות וראשית הדרך</span>
                                        <p className="text-gray-200 leading-relaxed text-2xl font-light">{c.figure.childhood}</p>
                                    </div>
                                    <div>
                                        <span className="text-indigo-500 font-black text-sm uppercase tracking-[0.3em] block mb-4 underline decoration-indigo-500/30">אידאולוגיה וחזון לאומי</span>
                                        <p className="text-gray-200 leading-relaxed text-2xl font-light">{c.figure.ideology}</p>
                                    </div>
                                    <div className="bg-indigo-600/10 p-8 rounded-3xl border-r-8 border-indigo-600 shadow-inner">
                                        <span className="text-indigo-400 font-black text-sm uppercase tracking-[0.3em] block mb-4">הישגים היסטוריים מרכזיים</span>
                                        <p className="text-white leading-relaxed text-3xl font-black">{c.figure.achievements}</p>
                                    </div>
                                </div>
                            </div>
                        </section>

                      </div>
                    </div>
                  </article>
                ))}
              </div>

              {/* מודל תמונה */}
              {selectedImg && (
                <div 
                  className="fixed inset-0 z-[100] bg-black/98 flex items-center justify-center p-6 md:p-12 animate-in fade-in zoom-in duration-500 cursor-zoom-out"
                  onClick={() => setSelectedImg(null)}
                >
                  <div className="max-w-7xl w-full flex flex-col items-center">
                    <img src={selectedImg.url} className="max-h-[85vh] rounded-3xl shadow-[0_0_80px_rgba(255,255,255,0.15)] mb-10 border border-gray-800" />
                    <h3 className="text-5xl font-black text-white mb-4 tracking-tighter">{selectedImg.title}</h3>
                    <p className="text-gray-500 text-xl">לחץ בכל מקום לחזרה למחקר</p>
                  </div>
                </div>
              )}

              {/* פוטר קרדיטים */}
              <footer className="mt-48 pb-20 max-w-6xl mx-auto">
                <div className="bg-gray-900 border border-gray-800 rounded-[3.5rem] p-16 text-right relative overflow-hidden shadow-2xl">
                    <div className="absolute top-0 right-0 w-48 h-48 bg-rose-500/10 rounded-bl-full -mr-24 -mt-24"></div>
                    <div className="grid md:grid-cols-2 gap-12 items-center">
                        <div className="space-y-5">
                            <p className="text-2xl"><strong className="text-rose-500 ml-3">הוגה המחקר:</strong> רם שלו</p>
                            <p className="text-2xl"><strong className="text-rose-500 ml-3">בנייה טכנית:</strong> ג'מיני (Gemini 2.5 Flash)</p>
                            <p className="text-2xl"><strong className="text-rose-500 ml-3">סיבת היצירה:</strong> פיתוח אטלס האומות המקיף והנגשת ידע היסטורי</p>
                            <p className="text-2xl"><strong className="text-rose-500 ml-3">שנת היצירה:</strong> 2026</p>
                        </div>
                        <div className="text-left text-gray-700 font-mono text-xl opacity-50">
                            RAM_ATLAS_V4_SEC_2_BALKANS
                        </div>
                    </div>
                </div>
              </footer>
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
