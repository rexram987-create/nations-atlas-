<!DOCTYPE html>
<html lang="he" dir="rtl" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>אטלס האומות | הבלקן המזרחי והדרומי</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { borderRadius: { 'bubble': '3rem' } } }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@200;400;700;800&display=swap');
        body { font-family: 'Assistant', sans-serif; background-color: #020617; }
        .bubble-card { background: rgba(30, 41, 59, 0.5); backdrop-filter: blur(12px); border: 2px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="min-h-screen text-slate-200 p-4 md:p-10 selection:bg-rose-500/30">
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;

        const FlagRomania = () => (<svg viewBox="0 0 300 200" className="w-full h-full rounded-2xl"><rect width="100" height="200" fill="#002B7F"/><rect x="100" width="100" height="200" fill="#FCD116"/><rect x="200" width="100" height="200" fill="#CE1126"/></svg>);
        const FlagBulgaria = () => (<svg viewBox="0 0 300 200" className="w-full h-full rounded-2xl"><rect width="300" height="66.6" fill="#FFF"/><rect y="66.6" width="300" height="66.6" fill="#00966E"/><rect y="133.2" width="300" height="66.6" fill="#D62612"/></svg>);
        const FlagNorthMacedonia = () => (<svg viewBox="0 0 300 200" className="w-full h-full rounded-2xl"><rect width="300" height="200" fill="#D20000"/><g fill="#FFE600"><polygon points="150,100 0,0 35,0 150,100"/><polygon points="150,100 265,0 300,0 150,100"/><polygon points="150,100 300,200 265,200 150,100"/><polygon points="150,100 0,200 35,200 150,100"/><circle cx="150" cy="100" r="32" fill="#D20000"/><circle cx="150" cy="100" r="25" fill="#FFE600"/></g></svg>);
        const FlagAlbania = () => (<svg viewBox="0 0 300 200" className="w-full h-full rounded-2xl"><rect width="300" height="200" fill="#FF0000"/><path transform="translate(150, 100) scale(1.2)" fill="#000" d="M-15,-20 C-10,-35 -5,-30 0,-25 C5,-30 10,-35 15,-20 C20,-5 25,10 10,15 C15,25 5,35 0,30 C-5,35 -15,25 -10,15 C-25,10 -20,-5 -15,-20 Z"/></svg>);
        const FlagGreece = () => (<svg viewBox="0 0 300 200" className="w-full h-full rounded-2xl">{[0,1,2,3,4,5,6,7,8].map(i=>(<rect key={i} y={i*(200/9)} width="300" height={200/9} fill={i%2===0?"#0D5EAF":"#FFF"}/>))}<rect width="100" height="111" fill="#0D5EAF"/><rect x="40" width="20" height="111" fill="#FFF"/><rect y="44" width="100" height="22" fill="#FFF"/></svg>);

        const countriesData = [
          {
            id: 'romania', name: 'רומניה', official: 'România', Flag: FlagRomania,
            founding: '1859 | 1877', area: '~238,397 קמ"ר', pop: '~19.1 מיליון',
            history: 'אומה לטינית בלב הבלקן הסלאבי. התאחדה במאה ה-19 ועברה תקופה קומוניסטית אכזרית תחת צ\'אושסקו עד למהפכת 1989.',
            geography: 'המדינה הגדולה בבלקן. הרי הקרפטים במרכז מקיפים את רמת טרנסילבניה, עד לשפך הדנובה לים השחור.',
            etymology: {
              sum: 'ארצם של הרומאים',
              parts: [{p:'Romanus', d:'לטינית: "רומאי". זהות תרבותית כיורשי האימפריה הרומית.'}, {p:'IA', d:'סיומת לטינית למדינה.'}]
            },
            figure: {
              n: 'מיכאי האמיץ', years: '1558-1601',
              child: 'נולד למשפחת אצולה. עסק במסחר בין-לאומי בבלקן בצעירותו.',
              ideo: 'חירות נוצרית ואחדות רומנית ראשונית נגד העות\'מאנים.',
              achieve: 'המנהיג הראשון שאיחד את ולאכיה, מולדביה וטרנסילבניה בשנת 1600.'
            },
            map: { url: '../images/map_romania_wallachia.jpg', t: 'נסיכויות רומניה ההיסטוריות' }
          },
          {
            id: 'bulgaria', name: 'בולגריה', official: 'Balgariya', Flag: FlagBulgaria,
            founding: '681 | 1908', area: '~110,994 קמ"ר', pop: '~6.4 מיליון',
            history: 'מעצמה עתיקה שהקימה אימפריות אדירות בימי הביניים שהתחרו בביזנטיון. השתחררה משלטון עות\'מאני במאה ה-19.',
            geography: 'מזרח הבלקן. רכס הרי הבלקן חוצה אותה לרוחבה, עם חוף זהוב לים השחור.',
            etymology: {
              sum: 'ארץ המורדים / השבטים המעורבים',
              parts: [{p:'Bulgar', d:'שורש טורקי עתיק "Bulğa" - לערבב או למרוד.'}, {p:'IA', d:'סיומת לטינית למדינה.'}]
            },
            figure: {
              n: 'הצאר סימאון הראשון', years: '864-927',
              child: 'בנו של בוריס הראשון. למד באקדמיית המגנאורה בקונסטנטינופול.',
              ideo: 'הפיכת בולגריה למרכז הרוחני והתרבותי האורתודוקסי ("רומא השלישית").',
              achieve: 'הביא את האימפריה לשיא טריטוריאלי והפך אותה למרכז הכתב הקירילי.'
            },
            map: { url: '../images/map_bulgaria_empire.jpg', t: 'האימפריה הבולגרית הראשונה' }
          }
          // (מדינות נוספות יופיעו כאן עם התיקון לנתיב ../images/)
        ];

        const App = () => {
          const [selectedImg, setSelectedImg] = useState(null);
          return (
            <div className="max-w-6xl mx-auto pb-24">
              <header className="text-center py-16 mb-12">
                <h1 className="text-6xl md:text-8xl font-black bg-gradient-to-r from-rose-400 to-indigo-400 bg-clip-text text-transparent mb-6 tracking-tighter">הבלקן המזרחי והדרומי</h1>
                <p className="text-2xl text-slate-400 font-light italic">אטלס האומות | S25 Ultra Edition</p>
              </header>
              <div className="space-y-32">
                {countriesData.map(c => (
                  <article key={c.id} className="bubble-card rounded-bubble p-8 md:p-14 relative overflow-hidden">
                    <div className="flex flex-col lg:flex-row gap-12">
                      <aside className="w-full lg:w-1/3 space-y-8">
                        <div className="aspect-[3/2] rounded-[2.5rem] shadow-2xl border border-slate-700 bg-slate-900"><c.Flag /></div>
                        <div className="grid grid-cols-2 gap-4">
                          {[['שטח',c.area],['אוכלוסייה',c.pop]].map(([label,val],i)=>(
                            <div key={i} className="bg-slate-800/40 p-5 rounded-3xl border border-slate-700/30 text-center">
                              <div className="text-[10px] text-slate-500 font-bold uppercase mb-1">{label}</div>
                              <div className="text-white font-black text-xs">{val}</div>
                            </div>
                          ))}
                        </div>
                        <div className="relative group cursor-pointer rounded-bubble overflow-hidden border-2 border-rose-500/20" onClick={()=>setSelectedImg(c.map)}>
                          <img src={c.map.url} className="w-full h-56 object-cover" />
                          <div className="absolute inset-0 bg-black/40 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity"><span className="bg-rose-600 text-white text-xs font-bold px-5 py-2 rounded-full">הגדל מפה</span></div>
                        </div>
                      </aside>
                      <div className="flex-grow space-y-12 text-right">
                        <h2 className="text-7xl font-black text-white mb-2 tracking-tighter">{c.name}</h2>
                        <section className="bg-amber-500/5 p-8 rounded-bubble border border-amber-500/20">
                          <h4 className="text-amber-400 font-black text-2xl mb-6"><i className="fa-solid fa-feather"></i> אטימולוגיה</h4>
                          <div className="space-y-6">{c.etymology.parts.map((p,i)=>(<div key={i} className="flex gap-4"><div className="text-amber-500 font-black min-w-[150px]">• {p.p}</div><div className="text-slate-300 text-lg">{p.d}</div></div>))}</div>
                        </section>
                        <section className="bg-indigo-500/5 p-10 rounded-bubble border border-indigo-500/20 shadow-inner">
                          <h4 className="text-4xl font-black text-white mb-10"><i className="fa-solid fa-crown text-indigo-400"></i> מנהיג מכונן: {c.figure.n}</h4>
                          <div className="space-y-8 text-2xl font-light leading-relaxed">
                             <p><span className="text-indigo-500 font-black text-sm block mb-3 uppercase tracking-widest">ילדות ורקע</span> {c.figure.child}</p>
                             <p><span className="text-indigo-500 font-black text-sm block mb-3 uppercase tracking-widest">אידאולוגיה וחזון</span> {c.figure.ideo}</p>
                             <div className="bg-indigo-600/10 p-8 rounded-3xl border-r-8 border-indigo-600 font-black text-3xl">{c.figure.achieve}</div>
                          </div>
                        </section>
                      </div>
                    </div>
                  </article>
                ))}
              </div>
              {selectedImg && (
                <div className="fixed inset-0 z-[100] bg-black/98 flex items-center justify-center p-6" onClick={()=>setSelectedImg(null)}>
                  <div className="max-w-7xl w-full flex flex-col items-center"><img src={selectedImg.url} className="max-h-[80vh] rounded-3xl shadow-2xl mb-8" /><h3 className="text-5xl font-black text-white">{selectedImg.t}</h3></div>
                </div>
              )}
            </div>
          );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
