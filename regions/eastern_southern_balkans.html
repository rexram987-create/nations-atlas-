                                                    src={c.map.url} 
                                                    alt={c.map.title} 
                                                    className="w-full h-64 object-cover group-hover:scale-105 transition-transform duration-700"
                                                    onError={(e) => { e.target.src = 'https://placehold.co/600x400/111827/white?text=Map+File+Missing'; }}
                                                />
                                                <div className="p-6 text-center">
                                                    <div className="text-rose-400 font-black mb-1 uppercase tracking-widest text-sm">קרטוגרפיה היסטורית</div>
                                                    <div className="text-white font-bold">{c.map.title}</div>
                                                    <div className="mt-3 text-xs text-gray-500 italic uppercase">לחץ להגדלה</div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </section>
                        ))}
                    </div>

                    {/* Footer Info */}
                    <footer className="mt-24 pt-12 border-t border-gray-800 text-center">
                        <div className="inline-block bg-gray-900 border border-gray-800 rounded-3xl p-8 text-right space-y-2">
                            <div><strong className="text-rose-500">שם ההוגה:</strong> רם שלו</div>
                            <div><strong className="text-rose-500">שם הבונה/היצרן:</strong> ג'מיני 2.5 פלאש</div>
                            <div><strong className="text-rose-500">סיבת היצירה:</strong> פיתוח אטלס האומות המלא והנגשת ידע היסטורי</div>
                            <div><strong className="text-rose-500">שנת היצירה:</strong> 2026</div>
                        </div>
                    </footer>

                    {/* Image Modal */}
                    {selectedImage && (
                        <div 
                            className="fixed inset-0 z-50 flex items-center justify-center bg-black/95 p-4 md:p-12 animate-in fade-in duration-300"
                            onClick={() => setSelectedImage(null)}
                        >
                            <div className="relative max-w-5xl w-full h-full flex flex-col items-center justify-center">
                                <img 
                                    src={selectedImage.url} 
                                    alt={selectedImage.title} 
                                    className="max-w-full max-h-[80vh] rounded-xl shadow-2xl border border-gray-800 object-contain"
                                />
                                <h3 className="text-white text-2xl font-black mt-6">{selectedImage.title}</h3>
                                <button className="mt-8 px-8 py-3 bg-rose-600 text-white font-bold rounded-full hover:bg-rose-500 transition-colors">סגור תצוגה</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
